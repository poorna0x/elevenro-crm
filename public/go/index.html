<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Hydrogen RO - Water Purification Services</title>
    <link rel="canonical" href="https://hydrogenro.com">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hydrogenro.com/">
    <meta property="og:title" content="Hydrogen RO - Water Purification Services">
    <meta property="og:description" content="Professional water purification and RO services">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://hydrogenro.com/">
    <meta property="twitter:title" content="Hydrogen RO - Water Purification Services">
    <meta property="twitter:description" content="Professional water purification and RO services">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .redirect-container {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }
        .redirect-message {
            color: #374151;
            margin-bottom: 1rem;
        }
        .redirect-link {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }
        .redirect-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <h1 class="redirect-message">Redirecting to Hydrogen RO...</h1>
        <p class="redirect-message">If you are not redirected automatically, <a href="https://hydrogenro.com" class="redirect-link">click here</a>.</p>
    </div>
    
    <script>
        // Use replace instead of assign for proper redirect behavior
        window.location.replace('https://hydrogenro.com');
        
        // Track redirect for analytics (optional)
        if (typeof gtag !== 'undefined') {
            gtag('event', 'redirect', {
                'event_category': 'navigation',
                'event_label': 'go_page_redirect'
            });
        }
    </script>
</body>
</html>
