<!DOCTYPE html>
<html>
<head>
    <title>Supabase Auth Test</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Supabase Auth Test</h1>
    <div id="status">Testing connection...</div>
    
    <script>
        // Replace with your actual Supabase URL and anon key
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        
        if (supabaseUrl === 'YOUR_SUPABASE_URL') {
            document.getElementById('status').innerHTML = 'Please update the Supabase URL and key in this file';
            return;
        }
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        async function testAuth() {
            try {
                // Test 1: Check if we can connect
                const { data, error } = await supabase.auth.getSession();
                console.log('Current session:', data, error);
                
                // Test 2: Try to sign in
                const { data: signInData, error: signInError } = await supabase.auth.signInWithPassword({
                    email: 'admin@test.com',
                    password: 'admin123'
                });
                
                console.log('Sign in result:', signInData, signInError);
                
                if (signInError) {
                    document.getElementById('status').innerHTML = `Error: ${signInError.message}`;
                } else {
                    document.getElementById('status').innerHTML = 'Success! User signed in.';
                }
                
            } catch (err) {
                console.error('Test error:', err);
                document.getElementById('status').innerHTML = `Connection error: ${err.message}`;
            }
        }
        
        testAuth();
    </script>
</body>
</html>
