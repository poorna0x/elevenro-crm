# Production (live) deploys only when the production branch is pushed.
# In Netlify: Site settings > Build & deploy > Continuous deployment >
# set "Production branch" to "main" and enable "Only deploy production branch" if you want live = main only.

[build]
  # Clear cache directories and do fresh install to avoid old cached dependencies
  command = "rm -rf node_modules/.cache .cache dist && cd netlify/functions && npm install && cd ../.. && npm install && npm run build"
  publish = "dist"

[context.production]
  command = "rm -rf node_modules/.cache .cache dist && cd netlify/functions && npm install && cd ../.. && npm install && npm run build"
  publish = "dist"

[dev]
  command = "npm run dev:vite"

[functions]
  directory = "netlify/functions"

# Force HTTPS - redirect HTTP to HTTPS
[[redirects]]
  from = "http://elevenro.com/*"
  to = "https://elevenro.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.elevenro.com/*"
  to = "https://www.elevenro.com/:splat"
  status = 301
  force = true

# Redirect old pages to main site with 301 status
[[redirects]]
  from = "/go"
  to = "https://elevenro.com"
  status = 301

[[redirects]]
  from = "/go/"
  to = "https://elevenro.com"
  status = 301

[[redirects]]
  from = "/go2"
  to = "https://elevenro.com"
  status = 301

[[redirects]]
  from = "/go2/"
  to = "https://elevenro.com"
  status = 301

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Allow sitemap and robots.txt to be accessed directly
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# CRM on hydrogenro.com only
[[redirects]]
  from = "/admin"
  to = "https://hydrogenro.com/admin"
  status = 302

[[redirects]]
  from = "/admin/*"
  to = "https://hydrogenro.com/admin"
  status = 302

[[redirects]]
  from = "/technician/*"
  to = "https://hydrogenro.com/technician/login"
  status = 302

[[redirects]]
  from = "/settings"
  to = "https://hydrogenro.com/settings"
  status = 302

[[redirects]]
  from = "/settings/*"
  to = "https://hydrogenro.com/settings"
  status = 302

[[redirects]]
  from = "/calling"
  to = "https://hydrogenro.com/calling"
  status = 302

[[redirects]]
  from = "/calling/*"
  to = "https://hydrogenro.com/calling"
  status = 302

# Handle SPA routing - redirect all non-API requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

# Environment variables are set in Netlify dashboard to avoid exposing API keys in git
# Add VITE_GOOGLE_MAPS_API_KEY in Netlify → Site settings → Environment variables

# Headers for caching and security
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://maps.googleapis.com https://maps.gstatic.com https://*.gstatic.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://maps.gstatic.com https://*.gstatic.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; worker-src 'self' blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://www.google-analytics.com https://*.google-analytics.com https://api.bigdatacloud.net https://api-bdc.io https://api.cloudinary.com https://res.cloudinary.com https://nominatim.openstreetmap.org https://maps.googleapis.com https://*.googleapis.com https://*.gstatic.com https://www.google.com https://*.google.com https://maps.app.goo.gl https://goo.gl https://elevenro.com https://www.elevenro.com https://hydrogenro.com; frame-src 'self' https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    Permissions-Policy = "accelerometer=(), autoplay=(), bluetooth=(), camera=(self), clipboard-read=(), clipboard-write=(self), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(self), gyroscope=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-create=(), publickey-credentials-get=(), usb=(), web-share=()"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Favicon files - shorter cache to allow updates, but still cacheable
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    X-Content-Type-Options = "nosniff"
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/favicon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/android-chrome-*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# No cache for HTML files
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
